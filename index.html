<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0d1117] h-screen flex items-center justify-center p-4">

    <main class="window-container w-full max-w-4xl h-[85vh] flex flex-col shadow-2xl">
        <div class="header-bar bg-[#161b22] p-3 flex items-center border-b border-[#30363d] rounded-t-lg">
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-[#ff5f56]"></div>
                <div class="w-3 h-3 rounded-full bg-[#ffbd2e]"></div>
                <div class="w-3 h-3 rounded-full bg-[#27c93f]"></div>
            </div>
            <div class="text-[#8b949e] text-xs font-mono w-full text-center">guest@portfolio: ~ (zsh)</div>
        </div>

        <div id="terminal" class="bg-[#0d1117]/90 p-6 overflow-y-auto flex-1 font-mono text-sm md:text-base border-x border-b border-[#30363d] rounded-bottom-lg">
            <div id="history" class="space-y-2">
                <p class="text-[#8b949e]">Escribe 'help' para comenzar...</p>
            </div>
            
            <div class="flex mt-4 gap-2">
                <span class="text-[#7ee787]">➜</span>
                <span class="text-[#58a6ff]">~</span>
                <input type="text" id="command-input" 
                       class="bg-transparent border-none outline-none text-[#c9d1d9] flex-1 w-full"
                       autofocus autocomplete="off" spellcheck="false">
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
