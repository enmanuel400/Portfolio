<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOS | Portfolio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen w-screen overflow-hidden text-slate-100">

    <div id="desktop" class="relative w-full h-[calc(100vh-48px)] p-8 flex flex-col flex-wrap content-start gap-10">
        
        <button onclick="openWindow('terminal-window')" class="flex flex-col items-center w-24 group transition-transform active:scale-95">
            <div class="w-16 h-16 bg-slate-900/80 rounded-2xl flex items-center justify-center border border-slate-600 shadow-xl group-hover:bg-slate-800">
                <span class="text-emerald-400 font-mono text-2xl font-bold">>_</span>
            </div>
            <span class="mt-2 text-xs font-bold tracking-wide text-white">Terminal</span>
        </button>

        <button onclick="openWindow('python-window')" class="flex flex-col items-center w-24 group transition-transform active:scale-95">
            <div class="w-16 h-16 bg-yellow-500/10 rounded-2xl flex items-center justify-center border border-yellow-500/30 shadow-xl group-hover:bg-yellow-500/20">
                <span class="text-3xl">🐍</span>
            </div>
            <span class="mt-2 text-xs font-bold tracking-wide text-white">Automator.py</span>
        </button>

        <button onclick="openWindow('mobile-window')" class="flex flex-col items-center w-24 group transition-transform active:scale-95">
            <div class="w-16 h-16 bg-blue-500/10 rounded-2xl flex items-center justify-center border border-blue-500/30 shadow-xl group-hover:bg-blue-500/20">
                <span class="text-3xl">📱</span>
            </div>
            <span class="mt-2 text-xs font-bold tracking-wide text-white">DevMonitor</span>
        </button>
    </div>

    <div id="terminal-window" class="window hidden w-full max-w-2xl h-[450px]">
        <div class="window-header">
            <div class="flex gap-2 mr-4">
                <div onclick="closeWindow('terminal-window')" class="w-3 h-3 bg-red-500 rounded-full cursor-pointer hover:bg-red-600"></div>
                <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            </div>
            <div class="text-slate-500 text-[9px] font-black tracking-[0.2em] grow text-center uppercase">System Terminal</div>
        </div>
        <div class="terminal-body flex-1 overflow-y-auto" id="terminal-scroll">
            <div id="history" class="space-y-3">
                <p class="text-slate-500 italic">DevOS v1.0.0 - Escribe 'help' para comandos.</p>
            </div>
            <div class="flex gap-2 mt-4 items-center">
                <span class="text-emerald-500 font-bold">➜</span>
                <input type="text" id="command-input" class="bg-transparent border-none outline-none flex-1 text-slate-100 font-medium text-lg" autofocus>
            </div>
        </div>
    </div>

    <div id="python-window" class="window hidden w-full max-w-xl h-[450px] bg-[#1a1a1a]">
        <div class="window-header">
            <div onclick="closeWindow('python-window')" class="w-3 h-3 bg-red-500 rounded-full cursor-pointer"></div>
            <div class="text-slate-500 text-[9px] font-black tracking-[0.2em] grow text-center uppercase text-white/50">Python 3.12 Engine</div>
        </div>
        <div class="p-6 flex flex-col h-[calc(100%-48px)]">
            <div class="flex-1 font-mono text-base overflow-y-auto mb-4 bg-black/60 p-5 rounded-xl border border-white/5 leading-relaxed shadow-inner" id="python-output">
                <span class="text-slate-600"># System ready. Press run to start...</span>
            </div>
            <button onclick="runPythonScript()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-yellow-500/20 text-lg">
                EJECUTAR SCRIPT
            </button>
        </div>
    </div>

    <div id="mobile-window" class="window hidden w-[360px] h-[680px]">
        <div class="window-header !bg-slate-800 rounded-t-2xl">
            <div onclick="closeWindow('mobile-window')" class="w-3 h-3 bg-red-500 rounded-full cursor-pointer"></div>
            <div class="text-slate-500 text-[9px] font-black tracking-[0.2em] grow text-center uppercase text-white/50">Device Monitor</div>
        </div>
        
        <div class="relative mx-auto w-[330px] h-[600px] bg-black rounded-[3rem] border-[10px] border-slate-800 overflow-hidden shadow-2xl mt-4">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-6 bg-slate-800 rounded-b-2xl z-20"></div>
            
            <div class="w-full h-full bg-[#0f172a] overflow-y-auto pt-10 pb-4 px-5 text-slate-100 font-sans">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-2xl tracking-tighter text-blue-400">DevMonitor</h3>
                    <span id="mobile-status" class="text-[11px] bg-slate-800 text-slate-400 px-3 py-1 rounded-full font-bold border border-white/10 italic tracking-widest">IDLE</span>
                </div>

                <div class="bg-slate-900/80 p-6 rounded-[2rem] border border-white/10 mb-6 shadow-xl">
                    <p class="text-blue-300 text-[11px] font-black uppercase mb-2 tracking-widest">Carga del Sistema</p>
                    <div class="flex items-end gap-2">
                        <span id="efficiency-val" class="text-5xl font-black text-white tracking-tighter">0%</span>
                    </div>
                    <div class="flex items-end gap-2 h-16 mt-6" id="mini-graph">
                        <div class="bg-slate-800 w-full h-1/4 rounded-md transition-all duration-700"></div>
                        <div class="bg-slate-800 w-full h-1/2 rounded-md transition-all duration-700"></div>
                        <div class="bg-slate-800 w-full h-1/3 rounded-md transition-all duration-700"></div>
                        <div class="bg-slate-800 w-full h-3/4 rounded-md transition-all duration-700"></div>
                    </div>
                </div>

                <div class="space-y-4">
                    <p class="text-slate-400 text-[11px] font-black uppercase px-1 tracking-widest">Logs de Red</p>
                    <div id="mobile-logs" class="space-y-3">
                        <p class="text-sm text-slate-500 italic px-1">Esperando señal...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="absolute bottom-0 w-full h-12 bg-black/40 backdrop-blur-2xl border-t border-white/5 flex items-center px-6 justify-between z-[100]">
        <div class="flex items-center gap-6 font-sans">
            <span class="text-white font-black tracking-tighter italic">DEV<span class="text-blue-500 underline text-lg italic">OS</span></span>
            <div id="clock" class="text-white/90 font-mono font-bold tracking-widest text-sm bg-white/5 px-2 py-1 rounded">00:00</div>
        </div>
        <div class="text-white/20 text-[9px] font-black uppercase tracking-[0.3em]">Environment: Production</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
