<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOS | Portfolio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen w-screen overflow-hidden text-slate-100">

    <div id="desktop" class="relative w-full h-[calc(100vh-48px)] p-8 flex flex-col flex-wrap content-start gap-8">
        
        <button onclick="openWindow('terminal-window')" class="icon-btn">
            <div class="icon-bg bg-slate-900/80 border-slate-600 text-emerald-400 font-mono font-bold text-2xl">>_</div>
            <span>Terminal</span>
        </button>

        <button onclick="openWindow('python-window')" class="icon-btn">
            <div class="icon-bg bg-yellow-500/10 border-yellow-500/30 text-3xl">🐍</div>
            <span>Python</span>
        </button>

        <button onclick="openWindow('shop-window')" class="icon-btn">
            <div class="icon-bg bg-orange-500/10 border-orange-500/30 text-3xl">🛒</div>
            <span>Shoppy</span>
        </button>

        <button onclick="openWindow('mobile-window')" class="icon-btn">
            <div class="icon-bg bg-blue-500/10 border-blue-500/30 text-3xl">📱</div>
            <span>Monitor</span>
        </button>

        <button onclick="openWindow('contact-window')" class="icon-btn">
            <div class="icon-bg bg-emerald-500/10 border-emerald-500/30 text-3xl">📇</div>
            <span>Contacto</span>
        </button>
    </div>

    <div id="terminal-window" class="window hidden w-full max-w-2xl h-[450px]">
        <div class="window-header">
            <div class="flex gap-2 mr-4">
                <div onclick="closeWindow('terminal-window')" class="w-3 h-3 bg-red-500 rounded-full cursor-pointer"></div>
                <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            </div>
            <div class="text-slate-500 text-[9px] font-black tracking-widest grow text-center uppercase">System Terminal</div>
        </div>
        <div class="terminal-body flex-1 overflow-y-auto p-6" id="terminal-scroll">
            <div id="history" class="space-y-2">
                </div>
            <div class="flex gap-2 mt-4 items-center">
                <span class="text-emerald-500 font-bold">➜</span>
                <input type="text" id="command-input" class="bg-transparent border-none outline-none flex-1 text-slate-100 font-medium text-lg" autofocus>
            </div>
        </div>
    </div>

    <div id="python-window" class="window hidden w-full max-w-xl h-[450px]">
        <div class="window-header">
            <div onclick="closeWindow('python-window')" class="w-3 h-3 bg-red-500 rounded-full cursor-pointer"></div>
            <div class="text-slate-500 text-[9px] font-black tracking-widest grow text-center uppercase text-white/40">Python v3.12 Engine</div>
        </div>
        <div class="p-6 flex flex-col h-[calc(100%-48px)] bg-[#1a1a1a]">
            <div class="flex-1 font-mono text-base overflow-y-auto mb-4 bg-black/60 p-5 rounded-xl border border-white/5" id="python-output">
                <span class="text-slate-600"># System ready. Run script to link mobile device...</span>
            </div>
            <button onclick="runPythonScript()" class="bg-yellow-500 hover:bg-yellow-400 text-black font-black py-4 rounded-xl active:scale-95 transition-all">EJECUTAR SCRIPT</button>
        </div>
    </div>

    <div id="shop-window" class="window hidden w-full max-w-4xl h-[600px] bg-white text-slate-900 font-sans">
        <div class="window-header !bg-slate-100 !border-slate-200">
            <div onclick="closeWindow('shop-window')" class="w-3 h-3 bg-red-500 rounded-full cursor-pointer"></div>
            <div class="text-slate-500 text-[9px] font-black tracking-widest grow text-center uppercase">DevStore / Marketplace</div>
        </div>
        <div id="shop-content" class="flex h-[calc(100%-48px)]"></div>
    </div>

    <div id="mobile-window" class="window hidden w-[360px] h-[680px]">
        <div class="window-header !bg-slate-800 rounded-t-2xl">
            <div onclick="closeWindow('mobile-window')" class="w-3 h-3 bg-red-500 rounded-full cursor-pointer"></div>
            <div class="text-slate-500 text-[9px] font-black tracking-widest grow text-center uppercase">Mobile Link Device</div>
        </div>
        <div class="relative mx-auto w-[330px] h-[600px] bg-black rounded-[3rem] border-[10px] border-slate-800 overflow-hidden mt-4 shadow-2xl">
            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-6 bg-slate-800 rounded-b-2xl z-20"></div>
            <div class="w-full h-full bg-[#0f172a] pt-10 pb-4 px-5 text-slate-100 font-sans overflow-y-auto hide-scrollbar">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-black text-2xl text-blue-400 italic">DevMonitor</h3>
                    <span id="mobile-status" class="text-[10px] bg-slate-800 text-slate-400 px-3 py-1 rounded-full border border-white/10 font-bold">IDLE</span>
                </div>
                <div class="bg-slate-900/80 p-6 rounded-[2rem] border border-white/10 mb-6 shadow-xl">
                    <p class="text-blue-300 text-[10px] font-black uppercase tracking-widest mb-1 text-center">Efficiency Score</p>
                    <div class="text-center"><span id="efficiency-val" class="text-6xl font-black text-white tracking-tighter">0%</span></div>
                    <div class="flex items-end gap-2 h-16 mt-6" id="mini-graph">
                        <div class="bg-slate-800 w-full h-1/4 rounded-sm"></div>
                        <div class="bg-slate-800 w-full h-1/2 rounded-sm"></div>
                        <div class="bg-slate-800 w-full h-1/3 rounded-sm"></div>
                        <div class="bg-slate-800 w-full h-3/4 rounded-sm"></div>
                    </div>
                </div>
                <div id="mobile-logs" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="contact-window" class="window hidden w-full max-w-md bg-[#0f172a]">
        <div class="window-header"><div onclick="closeWindow('contact-window')" class="w-3 h-3 bg-red-500 rounded-full cursor-pointer"></div></div>
        <div class="p-8 text-center">
            <div class="w-20 h-20 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl border-4 border-slate-800 shadow-xl">👨‍💻</div>
            <h2 class="text-2xl font-black text-white italic mb-6">Social Links</h2>
            <div class="grid grid-cols-2 gap-3">
                <a href="#" class="contact-card"><span>📧</span> Gmail</a>
                <a href="#" class="contact-card"><span>💬</span> WhatsApp</a>
                <a href="#" class="contact-card"><span>✈️</span> Telegram</a>
                <a href="#" class="contact-card"><span>🐙</span> GitHub</a>
                <a href="#" class="contact-card text-blue-400 border-blue-400/30"><span>🔗</span> LinkedIn</a>
                <a href="#" class="contact-card text-emerald-400 border-emerald-400/30"><span>🟢</span> Fiverr</a>
                <a href="#" class="contact-card text-sky-400 border-sky-400/30"><span>🔹</span> Freelancer</a>
            </div>
        </div>
    </div>

    <footer class="absolute bottom-0 w-full h-12 bg-black/40 backdrop-blur-2xl border-t border-white/5 flex items-center px-6 justify-between z-[100]">
        <div class="flex items-center gap-6"><span class="text-white font-black italic">DEV<span class="text-blue-500 underline text-lg">OS</span></span><div id="clock" class="text-white/90 font-mono font-bold text-sm bg-white/5 px-2 py-1 rounded">00:00</div></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
